<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ColdSwap</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#030816;
    font-family:'Inter',sans-serif;
    color:white;
    overflow-x:hidden;
}

/* BACKGROUND */

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at top left,#245cff22 0%,transparent 35%),
    radial-gradient(circle at bottom right,#2967ff18 0%,transparent 35%);
    z-index:-2;
}

body::after{
    content:"";
    position:fixed;
    width:600px;
    height:600px;
    background:#2563ff10;
    filter:blur(140px);
    border-radius:50%;
    right:-200px;
    top:150px;
    z-index:-1;
}

/* CONTAINER */

.container{
    width:1200px;
    max-width:92%;
    margin:auto;
}

/* HEADER */

header{
    padding:24px 0;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:15px;
    font-weight:600;
}

.logo-dot{
    width:10px;
    height:10px;
    background:#2d7cff;
    border-radius:50%;
    box-shadow:0 0 15px #2d7cff;
}

nav{
    display:flex;
    gap:32px;
}

nav a{
    color:#8d9bc7;
    text-decoration:none;
    font-size:13px;
    transition:.3s;
}

nav a:hover{
    color:white;
}

.connect-btn{
    background:#1f6dff;
    border:none;
    color:white;
    padding:10px 18px;
    border-radius:14px;
    font-size:12px;
    font-weight:600;
    cursor:pointer;
    box-shadow:0 0 18px rgba(37,99,255,.35);
}

/* HERO */

.hero{
    margin-top:40px;
    display:grid;
    grid-template-columns:1fr 420px;
    gap:80px;
    align-items:center;
}

.hero h1{
    font-size:72px;
    line-height:1.03;
    font-weight:700;
    max-width:650px;
    letter-spacing:-2px;
}

.hero h1 span{
    color:#5da8ff;
}

.hero p{
    margin-top:22px;
    max-width:500px;
    color:#7382b2;
    font-size:16px;
    line-height:1.8;
}

.hero-buttons{
    display:flex;
    gap:16px;
    margin-top:36px;
}

.primary-btn{
    padding:14px 24px;
    border-radius:16px;
    border:none;
    background:linear-gradient(180deg,#3b8dff,#1f6dff);
    color:white;
    font-weight:600;
    cursor:pointer;
    box-shadow:
    0 0 25px rgba(37,99,255,.45),
    inset 0 1px 1px rgba(255,255,255,.2);
}

.secondary-btn{
    padding:14px 24px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,.08);
    background:#0c1224;
    color:white;
    font-weight:500;
    cursor:pointer;
}

/* SWAP CARD */

.swap-card{
    position:relative;
    background:linear-gradient(180deg,#0d152c,#091122);
    border-radius:32px;
    padding:24px;
    border:1px solid rgba(255,255,255,.06);
    box-shadow:
    0 0 40px rgba(0,0,0,.45),
    inset 0 1px 1px rgba(255,255,255,.03);
}

.swap-tabs{
    display:flex;
    gap:12px;
    margin-bottom:22px;
}

.swap-tab{
    flex:1;
    background:#0b1327;
    border-radius:14px;
    padding:12px;
    text-align:center;
    font-size:13px;
    color:#8190bd;
    border:1px solid rgba(255,255,255,.04);
}

.swap-tab.active{
    background:linear-gradient(180deg,#3b8dff,#2563ff);
    color:white;
    box-shadow:0 0 20px rgba(37,99,255,.35);
}

.swap-input{
    background:#07101f;
    border:1px solid rgba(255,255,255,.04);
    border-radius:22px;
    padding:18px;
    margin-bottom:18px;
}

.swap-top{
    display:flex;
    justify-content:space-between;
    color:#7280a9;
    font-size:12px;
    margin-bottom:14px;
}

.swap-main{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.swap-main input{
    background:none;
    border:none;
    outline:none;
    color:white;
    font-size:34px;
    font-weight:700;
    width:100%;
}

.token{
    display:flex;
    align-items:center;
    gap:10px;
    background:#0e1831;
    border-radius:14px;
    padding:10px 14px;
    font-weight:600;
    font-size:14px;
}

.token-circle{
    width:22px;
    height:22px;
    border-radius:50%;
}

.eth{
    background:#ff8c42;
}

.usdt{
    background:#e6e6e6;
}

.swap-middle{
    width:58px;
    height:58px;
    border-radius:50%;
    margin:18px auto;
    background:linear-gradient(180deg,#3b8dff,#2563ff);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    box-shadow:0 0 24px rgba(37,99,255,.45);
}

.swap-btn{
    width:100%;
    border:none;
    padding:17px;
    border-radius:18px;
    background:linear-gradient(180deg,#3b8dff,#2563ff);
    color:white;
    font-weight:700;
    font-size:15px;
    margin-top:8px;
    cursor:pointer;
    box-shadow:0 0 25px rgba(37,99,255,.35);
}

/* STATS */

.stats{
    margin-top:90px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:18px;
}

.stat{
    background:linear-gradient(180deg,#0c1429,#091120);
    border-radius:24px;
    padding:28px;
    border:1px solid rgba(255,255,255,.05);
}

.stat small{
    color:#7d8ab5;
    display:block;
    margin-bottom:12px;
    font-size:13px;
}

.stat h2{
    font-size:44px;
    letter-spacing:-1px;
}

/* TITLES */

.section-title{
    margin-top:95px;
    margin-bottom:28px;
    font-size:36px;
    letter-spacing:-1px;
}

/* FEATURES */

.features{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:18px;
}

.feature{
    position:relative;
    overflow:hidden;

    background:
    linear-gradient(
    180deg,
    #101a35 0%,
    #0a1120 100%
    );

    border-radius:30px;

    padding:34px 28px;

    border:1px solid rgba(255,255,255,.05);

    transition:.35s;

    min-height:255px;
}

.feature::before{
    content:"";

    position:absolute;
    inset:0;

    background:
    radial-gradient(
    circle at top left,
    rgba(70,120,255,.18),
    transparent 45%
    );

    pointer-events:none;
}

.feature::after{
    content:"";

    position:absolute;

    width:220px;
    height:220px;

    top:-120px;
    right:-120px;

    border-radius:50%;

    background:
    radial-gradient(
    circle,
    rgba(70,120,255,.08),
    transparent 70%
    );

    pointer-events:none;
}

.feature:hover{
    transform:translateY(-6px);

    border-color:
    rgba(80,130,255,.18);

    box-shadow:
    0 0 35px rgba(37,99,255,.16);
}

/* ICON */

.feature-icon{
    width:82px;
    height:82px;

    margin-bottom:26px;

    position:relative;

    display:flex;
    align-items:center;
    justify-content:center;
}

.feature-icon svg{
    width:68px;
    height:68px;

    stroke:#4285ff;
    fill:none;

    stroke-width:1.8;

    stroke-linecap:round;
    stroke-linejoin:round;

    position:relative;
    z-index:2;
}

.feature-icon::after{
    content:"";

    position:absolute;

    width:90px;
    height:90px;

    border-radius:50%;

    background:#2563ff;

    filter:blur(40px);

    opacity:.18;

    z-index:1;
}

.feature h3{
    font-size:24px;
    margin-bottom:12px;
    position:relative;
    z-index:2;
}

.feature p{
    color:#7f8db7;
    line-height:1.7;
    font-size:14px;
    position:relative;
    z-index:2;
}

</style>
</head>

<body>

<div class="container">

<h2 class="section-title">Why Choose ColdSwap</h2>

<section class="features">

<div class="feature">

<div class="feature-icon">
<svg viewBox="0 0 24 24">
<path d="M13 2L4 14H11L9 22L20 9H13L13 2Z"/>
</svg>
</div>

<h3>Ultra Fast</h3>

<p>
Fast execution mechanism optimized for
cross-chain crypto transfers.
</p>

</div>

<div class="feature">

<div class="feature-icon">
<svg viewBox="0 0 24 24">
<path d="M7 7L12 12L17 7"/>
<path d="M7 13L12 18L17 13"/>
</svg>
</div>

<h3>Low Fees</h3>

<p>
Minimal blockchain transaction
costs with optimized routing.
</p>

</div>

<div class="feature">

<div class="feature-icon">
<svg viewBox="0 0 24 24">
<rect x="5" y="11" width="14" height="10" rx="2"/>
<path d="M8 11V7C8 4.8 9.8 3 12 3C14.2 3 16 4.8 16 7V11"/>
</svg>
</div>

<h3>Secure</h3>

<p>
Multi-layer encryption and audited
smart contracts for maximum safety.
</p>

</div>

</section>

</div>

</body>
</html>
